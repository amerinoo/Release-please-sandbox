name: Create RC

on:
  workflow_dispatch:
    inputs:
      rc_suffix:
        description: "RC suffix (e.g., RC.1, RC.2)"
        required: false
        type: string
        default: "RC.1"

permissions:
  contents: write

jobs:
  create-rc:
    runs-on: ubuntu-latest
    environment: beta

    steps:
      - uses: actions/checkout@v4

      - name: Get RC version
        id: get-version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get the open Release Please PR
          PR_NUMBER=$(gh pr list --label "autorelease: pending" --json number --jq '.[0].number')
          if [ -n "$PR_NUMBER" ]; then
            # Get the branch name and checkout
            PR_BRANCH=$(gh pr view $PR_NUMBER --json headRefName --jq '.headRefName')
            git fetch origin $PR_BRANCH
            git checkout $PR_BRANCH
            # Get version from manifest
            BASE_VERSION=$(jq -r '."."' .release-please-manifest.json)
            RC_VERSION="${BASE_VERSION}-${{ inputs.rc_suffix }}"
            
            echo "base_version=${BASE_VERSION}" >> $GITHUB_OUTPUT
            echo "rc_version=${RC_VERSION}" >> $GITHUB_OUTPUT
            echo "pr_branch=${PR_BRANCH}" >> $GITHUB_OUTPUT
            
            echo "=== RC VERSION ==="
            echo "Base version: ${BASE_VERSION}"
            echo "RC version: ${RC_VERSION}"
            echo "Branch: ${PR_BRANCH}"
          else
            echo "ERROR: No Release Please PR found"
            exit 1
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Build with Maven
        run: |
          echo "Building RC version: ${{ steps.get-version.outputs.rc_version }}"
          mvn clean package -Drevision=${{ steps.get-version.outputs.rc_version }}

      - name: Create GitHub Release (Prerelease)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RC_VERSION="${{ steps.get-version.outputs.rc_version }}"
          TAG_NAME="v${RC_VERSION}"

          # Create tag
          git tag ${TAG_NAME}
          git push origin ${TAG_NAME}

          # Create prerelease
          gh release create ${TAG_NAME} \
            --title "Release Candidate ${RC_VERSION}" \
            --notes "🚀 Release Candidate ${RC_VERSION}

          This is a pre-release version for testing purposes.

          **Base version:** ${{ steps.get-version.outputs.base_version }}
          **RC suffix:** ${{ inputs.rc_suffix }}
          **Branch:** ${{ steps.get-version.outputs.pr_branch }}
          **Commit:** ${GITHUB_SHA::7}

          ## Build Info
          - Maven: \`mvn clean package -Drevision=${RC_VERSION}\`
          - Docker tags: \`beta\`, \`${RC_VERSION}\`, \`beta-${GITHUB_SHA::7}\`
          " \
            --prerelease \
            target/*.jar

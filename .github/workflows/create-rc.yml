name: Create RC

on:
  workflow_dispatch:
    inputs:
      version:
        description: "RC version (e.g., 1.8.0-RC.1)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  create-rc:
    runs-on: ubuntu-latest
    environment: beta

    steps:
      - uses: actions/checkout@v4

      - name: Build RC version
        run: |
          echo "=== RC BUILD ==="
          echo "Version: ${{ inputs.version }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "SHA: ${GITHUB_SHA::7}"
          echo ""
          echo "Maven build command:"
          echo "mvn clean package -Drevision=${{ inputs.version }}"
          echo ""
          echo "Docker tags:"
          echo "  - beta"
          echo "  - ${{ inputs.version }}"
          echo "  - beta-${GITHUB_SHA::7}"

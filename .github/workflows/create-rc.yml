name: Create RC

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-rc:
    runs-on: ubuntu-latest
    environment: beta

    steps:
      - uses: actions/checkout@v4

      - name: Calculate RC version
        id: get-version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get the open Release Please PR
          PR_NUMBER=$(gh pr list --label "autorelease: pending" --json number --jq '.[0].number')
          if [ -z "$PR_NUMBER" ]; then
            echo "ERROR: No Release Please PR found"
            exit 1
          fi

          # Get the branch name and checkout
          PR_BRANCH=$(gh pr view $PR_NUMBER --json headRefName --jq '.headRefName')
          git fetch origin $PR_BRANCH
          git checkout $PR_BRANCH

          # Get base version from manifest
          BASE_VERSION=$(jq -r '."."' .release-please-manifest.json)
          echo "Base version from manifest: ${BASE_VERSION}"

          # Find existing RC releases for this base version
          # List all releases and filter by tag pattern v{BASE_VERSION}-RC*
          EXISTING_RCS=$(gh release list --limit 100 --json tagName,isPrerelease --jq ".[] | select(.isPrerelease == true and (.tagName | startswith(\"v${BASE_VERSION}-RC\"))) | .tagName")

          if [ -z "$EXISTING_RCS" ]; then
            # No existing RCs for this version, start with RC1
            RC_NUMBER=1
            echo "No existing RCs found for version ${BASE_VERSION}"
          else
            # Find the highest RC number
            echo "Existing RCs found:"
            echo "$EXISTING_RCS"
            
            # Extract RC numbers and find the maximum
            MAX_RC=$(echo "$EXISTING_RCS" | sed -n "s/v${BASE_VERSION}-RC\([0-9]*\)/\1/p" | sort -n | tail -1)
            RC_NUMBER=$((MAX_RC + 1))
            echo "Highest existing RC: RC${MAX_RC}"
          fi

          RC_VERSION="${BASE_VERSION}-RC${RC_NUMBER}"

          echo "base_version=${BASE_VERSION}" >> $GITHUB_OUTPUT
          echo "rc_version=${RC_VERSION}" >> $GITHUB_OUTPUT
          echo "rc_number=${RC_NUMBER}" >> $GITHUB_OUTPUT
          echo "pr_branch=${PR_BRANCH}" >> $GITHUB_OUTPUT

          echo ""
          echo "=== RC VERSION CALCULATED ==="
          echo "Base version: ${BASE_VERSION}"
          echo "RC number: ${RC_NUMBER}"
          echo "RC version: ${RC_VERSION}"
          echo "Branch: ${PR_BRANCH}"


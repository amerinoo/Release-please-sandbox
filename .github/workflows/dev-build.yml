name: Dev build (debug)

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  dev:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Debug dev build
        run: |
          echo "=== DEV BUILD ==="
          echo "SHA: ${{ github.sha }}"
          echo "Short SHA: ${GITHUB_SHA::7}"
          echo "Run number: ${{ github.run_number }}"

      - name: Simulate tags
        run: |
          echo "=== TAGS ==="
          echo "dev"
          echo "dev-${GITHUB_SHA::7}"
          echo "build-${GITHUB_SHA::7}"
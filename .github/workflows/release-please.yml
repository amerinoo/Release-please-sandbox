name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      pr: ${{ steps.release.outputs.pr }}
    steps:
      - uses: actions/checkout@v4

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.MY_RELEASE_PLEASE_TOKEN }}

      - name: Debug outputs
        run: |
          echo "=== RELEASE PLEASE OUTPUTS ==="
          echo "release_created: ${{ steps.release.outputs.release_created }}"
          echo "tag_name: ${{ steps.release.outputs.tag_name }}"
          echo "pr: ${{ steps.release.outputs.pr }}"

  deploy:
    needs: release-please
    runs-on: ubuntu-latest
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          VERSION="${TAG#v}"
          echo "=== PROD DEPLOY ==="
          echo "Deploying version: ${VERSION}"
          echo "Tag: ${TAG}"

  dev:
    needs: release-please
    runs-on: ubuntu-latest
    if: ${{ needs.release-please.outputs.release_created != 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Build dev version
        run: |
          # Get version from manifest file
          VERSION=$(jq -r '."."' .release-please-manifest.json)
          echo "=== DEV BUILD ==="
          echo "Version from manifest: ${VERSION}"
          echo "SHA: ${GITHUB_SHA::7}"
          echo "Tags: dev, dev-${VERSION}, dev-${GITHUB_SHA::7}, build-${VERSION}-${GITHUB_SHA::7}"
          echo ""
          echo "Maven package command:"
          echo "mvn clean package -Drevision=${VERSION}-SNAPSHOT"

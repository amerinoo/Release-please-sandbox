name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.MY_RELEASE_PLEASE_TOKEN }}

      - name: Debug Release Please Step Outputs
        env:
          RELEASE_CREATED: ${{ steps.release.outputs.release_created }}
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
          PR: ${{ steps.release.outputs.pr }}
          PRS_CREATED: ${{ steps.release.outputs.prs_created }}
          PATHS_RELEASED: ${{ steps.release.outputs.paths_released }}
          RELEASES_CREATED: ${{ steps.release.outputs.releases_created }}
        run: |
          echo "=== RELEASE PLEASE STEP OUTPUTS ==="
          echo "release_created: ${RELEASE_CREATED}"
          echo "tag_name: ${TAG_NAME}"
          echo "pr: ${PR}"
          echo "prs_created: ${PRS_CREATED}"
          echo "paths_released: ${PATHS_RELEASED}"
          echo "releases_created: ${RELEASES_CREATED}"
  deploy:
    needs: release-please
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Show Release Please Outputs
        run: |
          echo "=== RELEASE PLEASE OUTPUTS ==="
          echo "release_created: ${{ needs.release-please.outputs.release_created }}"
          echo "tag_name: ${{ needs.release-please.outputs.tag_name }}"
          echo "All outputs from release-please job:"
          echo "${{ toJSON(needs.release-please.outputs) }}"

      - name: Deploy
        if: ${{ needs.release-please.outputs.release_created }}
        run: |
          echo "=== PROD DEPLOY ==="
          echo "Deploying version: ${{ needs.release-please.outputs.tag_name }}"

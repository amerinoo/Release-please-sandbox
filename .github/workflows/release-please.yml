name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      pr: ${{ steps.release.outputs.pr }}
    steps:
      - uses: actions/checkout@v4

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.MY_RELEASE_PLEASE_TOKEN }}

      - name: Debug outputs
        env:
          RELEASE_CREATED: ${{ steps.release.outputs.release_created }}
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
          PR: ${{ steps.release.outputs.pr }}
        run: |
          echo "=== RELEASE PLEASE OUTPUTS ==="
          echo "release_created: ${RELEASE_CREATED}"
          echo "tag_name: ${TAG_NAME}"
          echo "pr: ${PR}"

  deploy:
    needs: release-please
    runs-on: ubuntu-latest
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          VERSION="${TAG#v}"
          echo "=== PROD DEPLOY ==="
          echo "Deploying version: ${VERSION}"
          echo "Tag: ${TAG}"

  dev:
    needs: release-please
    runs-on: ubuntu-latest
    if: ${{ needs.release-please.outputs.release_created != 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Get Release Please PR
        id: get_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get the open Release Please PR
          PR_NUMBER=$(gh pr list --label "autorelease: pending" --json number --jq '.[0].number')
          if [ -n "$PR_NUMBER" ]; then
            echo "pr_number=${PR_NUMBER}" >> $GITHUB_OUTPUT
            # Get the branch name
            PR_BRANCH=$(gh pr view $PR_NUMBER --json headRefName --jq '.headRefName')
            echo "pr_branch=${PR_BRANCH}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout PR branch
        if: steps.get_pr.outputs.pr_branch != ''
        run: |
          git fetch origin ${{ steps.get_pr.outputs.pr_branch }}
          git checkout ${{ steps.get_pr.outputs.pr_branch }}

      - name: Build dev version
        run: |
          # Get version from manifest file (from PR branch if available)
          VERSION=$(jq -r '."."' .release-please-manifest.json)
          echo "=== DEV BUILD ==="
          echo "Version from manifest: ${VERSION}"
          echo "SHA: ${GITHUB_SHA::7}"
          echo "Tags: dev
          echo ""
          echo "Maven package command:"
          echo "mvn clean package -Drevision=${VERSION}-SNAPSHOT"

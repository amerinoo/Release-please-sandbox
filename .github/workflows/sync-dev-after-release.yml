name: Sync Dev After Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  sync-dev:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout dev branch
        uses: actions/checkout@v4
        with:
          ref: dev
          token: ${{ secrets.MY_RELEASE_PLEASE_TOKEN }}

      - name: Get release version
        id: version
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Update dev manifest
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "{
            \".\": \"${VERSION}-RC.0\"
          }" > .release-please-manifest-dev.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .release-please-manifest-dev.json
          git commit -m "chore: sync dev manifest with main release ${{ steps.version.outputs.version }}"
          git push origin dev

      - name: Create RC.0 tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git tag "${VERSION}-RC.0"
          git push origin "${VERSION}-RC.0"

